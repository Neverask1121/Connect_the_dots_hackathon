version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - metadata-service
      - file-service

  metadata-service:
    build: ./metadata-service
    ports:
      - "3001:3001"
    depends_on:
      - mongo

  file-service:
    build: ./file-service
    ports:
      - "3002:3002"
    depends_on:
      - minio

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password