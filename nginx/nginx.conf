events {}

http {
    server {
        listen 80;

        location /api/metadata {
            proxy_pass http://metadata-service:3001;
        }

        location /api/upload-file {
            proxy_pass http://file-service:3002;
        }

        location /api/get-file {
            proxy_pass http://file-service:3002;
        }

        location /api/health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}